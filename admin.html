<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurgerStreet - Panel Admin</title>
    <!-- Google Fonts: Bebas Neue & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-black: #080808;
            --card-gray: #1a1a1a;
            --primary-red: #E30613;
            --text-white: #ffffff;
            --text-gray: #adb5bd;
            --success-green: #2e7d32;
            --btn-gray: #444444;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3, .title-font {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
        }

        /* --- Login Screen --- */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=1600&q=80');
            background-size: cover;
            background-position: center;
        }

        .login-card {
            background: rgba(26, 26, 26, 0.95);
            padding: 50px 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(227, 6, 19, 0.2);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .login-card h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: var(--text-white);
        }

        .login-card h1 span { color: var(--primary-red); }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .form-control {
            width: 100%;
            padding: 15px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary-red);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary-red);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: var(--transition);
        }

        .btn-login:hover {
            background: #c20510;
            transform: translateY(-2px);
        }

        .login-error {
            color: var(--primary-red);
            font-size: 0.85rem;
            margin-top: 15px;
            font-weight: 600;
            display: none;
        }

        /* --- Dashboard Layout --- */
        #admin-panel {
            display: none;
            padding: 40px 5%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 { font-size: 2.5rem; }
        .header h1 span { color: var(--primary-red); }

        .header-btns {
            display: flex;
            gap: 15px;
        }

        .btn-action {
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .btn-clear { background: var(--btn-gray); color: white; }
        .btn-clear:hover { background: #555; }
        .btn-logout { background: var(--primary-red); color: white; }
        .btn-logout:hover { background: #c20510; }

        /* --- Stats Grid --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: var(--card-gray);
            padding: 30px;
            border-radius: 20px;
            border-left: 5px solid var(--primary-red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .stat-card h3 {
            font-size: 1.1rem;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary-red);
            font-family: 'Bebas Neue', sans-serif;
        }

        /* --- Filters --- */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .filter-btn {
            padding: 10px 25px;
            border-radius: 30px;
            background: var(--card-gray);
            color: var(--text-gray);
            border: 1px solid #333;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            white-space: nowrap;
        }

        .filter-btn.active {
            background: var(--primary-red);
            color: white;
            border-color: var(--primary-red);
        }

        /* --- Orders List --- */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }

        .order-card {
            background: var(--card-gray);
            border-radius: 25px;
            padding: 25px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .order-card.completed {
            opacity: 0.6;
            order: 9999;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .order-id {
            color: var(--primary-red);
            font-weight: 800;
            font-size: 1.2rem;
            font-family: 'Bebas Neue', sans-serif;
        }

        .order-date {
            color: var(--text-gray);
            font-size: 0.85rem;
        }

        .client-info {
            margin-bottom: 20px;
        }

        .client-info p {
            margin-bottom: 5px;
            font-size: 0.95rem;
        }

        .client-info strong { color: var(--text-gray); }

        .order-details {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-gray);
        }

        .order-items {
            margin-bottom: 20px;
        }

        .order-items h4 {
            font-size: 0.9rem;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }

        .product-line {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .order-footer {
            margin-top: auto;
        }

        .order-totals {
            margin-bottom: 20px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .total-final {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary-red);
            margin-top: 10px;
            font-family: 'Bebas Neue', sans-serif;
        }

        .btn-complete {
            width: 100%;
            padding: 15px;
            background: var(--success-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-complete:hover {
            background: #236127;
        }

        /* --- Analysis Tables --- */
        .analysis-section {
            margin-top: 80px;
        }

        .analysis-section h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            color: var(--primary-red);
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 40px;
        }

        .table-container {
            background: var(--card-gray);
            padding: 30px;
            border-radius: 25px;
            overflow-x: auto;
        }

        .table-container h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--text-white);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 15px;
            color: var(--primary-red);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            border-bottom: 1px solid #333;
        }

        td {
            padding: 15px;
            font-size: 0.95rem;
            border-bottom: 1px solid #222;
        }

        tr:last-child td { border-bottom: none; }

        @media (max-width: 768px) {
            .tables-grid { grid-template-columns: 1fr; }
            .header { text-align: center; justify-content: center; }
            .header-btns { width: 100%; justify-content: center; }
            .orders-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <section id="login-screen">
        <div class="login-card">
            <h1>BURGER<span>STREET</span><br><small style="font-size: 1.2rem; font-weight: 400; color: white;">Panel Admin</small></h1>
            <form id="login-form">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="username" class="form-control" placeholder="Admin" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Ingresar al Panel</button>
                <p id="login-error" class="login-error">Credenciales incorrectas.</p>
            </form>
        </div>
    </section>

    <!-- Admin Panel Content -->
    <section id="admin-panel">
        <div class="header">
            <h1>ADMIN<span>PANEL</span></h1>
            <div class="header-btns">
                <button class="btn-action btn-clear" onclick="clearDatabase()">Limpiar Base de Datos</button>
                <button class="btn-action btn-logout" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <!-- Real-time Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Pedidos Hoy</h3>
                <div class="value" id="stat-orders-today">0</div>
            </div>
            <div class="stat-card">
                <h3>Ventas Hoy</h3>
                <div class="value" id="stat-sales-today">$0</div>
            </div>
            <div class="stat-card">
                <h3>Total Histórico</h3>
                <div class="value" id="stat-sales-total">$0</div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('TODOS', this)">TODOS</button>
            <button class="filter-btn" onclick="setFilter('PENDIENTE', this)">PENDIENTES</button>
            <button class="filter-btn" onclick="setFilter('COMPLETADO', this)">COMPLETADOS</button>
        </div>

        <!-- Orders Grid -->
        <div class="orders-grid" id="orders-container">
            <!-- Order cards will be injected here -->
        </div>

        <!-- Analysis Section -->
        <div class="analysis-section">
            <h2>Análisis de Ventas</h2>
            <div class="tables-grid">
                <!-- Monthly Summary -->
                <div class="table-container">
                    <h3>Resumen Mensual</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Mes</th>
                                <th>Pedidos</th>
                                <th>Ventas</th>
                            </tr>
                        </thead>
                        <tbody id="table-monthly">
                            <!-- Monthly rows -->
                        </tbody>
                    </table>
                </div>

                <!-- Best Sellers -->
                <div class="table-container">
                    <h3>Productos Más Vendidos</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Cant.</th>
                                <th>Generado</th>
                            </tr>
                        </thead>
                        <tbody id="table-products">
                            <!-- Product rows -->
                        </tbody>
                    </table>
                </div>

                <!-- Daily Sales -->
                <div class="table-container">
                    <h3>Ventas por Día</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Pedidos</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="table-daily">
                            <!-- Daily rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <script>
        // --- 1. CONFIGURATION ---
        // REPLACE THIS WITH YOUR OWN FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "burgerstreet-demo.firebaseapp.com",
            projectId: "burgerstreet-demo",
            storageBucket: "burgerstreet-demo.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        // Admin Credentials
        const ADMIN_USER = "ADMIN";
        const ADMIN_PASS = "12345"; // CHANGE THIS

        // --- 2. AUTHENTICATION LOGIC ---
        const SESSION_EXPIRY_HOURS = 8;
        let loginAttempts = 0;
        const MAX_ATTEMPTS = 3;
        const BLOCK_TIME_MS = 5 * 60 * 1000; // 5 minutes

        function checkAuth() {
            const session = JSON.parse(localStorage.getItem('admin_session'));
            if (!session) return showLogin();
            
            const now = new Date().getTime();
            if (now > session.expiry) {
                localStorage.removeItem('admin_session');
                return showLogin();
            }
            showPanel();
        }

        function showLogin() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('admin-panel').style.display = 'none';
        }

        function showPanel() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            initFirebase();
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            
            const lastBlock = localStorage.getItem('block_until');
            if (lastBlock && new Date().getTime() < parseInt(lastBlock)) {
                errorEl.innerText = "Panel bloqueado. Intenta de nuevo en unos minutos.";
                errorEl.style.display = 'block';
                return;
            }

            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                const expiry = new Date().getTime() + (SESSION_EXPIRY_HOURS * 60 * 60 * 1000);
                localStorage.setItem('admin_session', JSON.stringify({ user, expiry }));
                loginAttempts = 0;
                showPanel();
            } else {
                loginAttempts++;
                errorEl.style.display = 'block';
                if (loginAttempts >= MAX_ATTEMPTS) {
                    const blockUntil = new Date().getTime() + BLOCK_TIME_MS;
                    localStorage.setItem('block_until', blockUntil.toString());
                    errorEl.innerText = "Demasiados intentos. Bloqueado por 5 minutos.";
                }
            }
        });

        function logout() {
            localStorage.removeItem('admin_session');
            location.reload();
        }

        // --- 3. FIREBASE & DATA LOGIC ---
        let db;
        let allOrders = [];
        let currentFilter = 'TODOS';

        function initFirebase() {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
            listenOrders();
        }

        function listenOrders() {
            db.collection("pedidos").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderDashboard();
            });
        }

        function renderDashboard() {
            updateStats();
            renderOrders();
            renderAnalysis();
        }

        function updateStats() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];

            const ordersToday = allOrders.filter(o => o.timestamp?.toDate().toISOString().split('T')[0] === todayStr);
            const salesToday = ordersToday.reduce((sum, o) => sum + (o.total || 0), 0);
            const salesTotal = allOrders.reduce((sum, o) => sum + (o.total || 0), 0);

            document.getElementById('stat-orders-today').innerText = ordersToday.length;
            document.getElementById('stat-sales-today').innerText = formatCOP(salesToday);
            document.getElementById('stat-sales-total').innerText = formatCOP(salesTotal);
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderOrders();
        }

        function renderOrders() {
            const container = document.getElementById('orders-container');
            container.innerHTML = '';

            let filtered = allOrders;
            if (currentFilter !== 'TODOS') {
                filtered = allOrders.filter(o => (o.status || 'PENDIENTE') === currentFilter);
            }

            // Custom sort: Pending first (within the filtered set), then by date
            const sorted = [...filtered].sort((a, b) => {
                const statusA = a.status || 'PENDIENTE';
                const statusB = b.status || 'PENDIENTE';
                if (statusA === 'PENDIENTE' && statusB === 'COMPLETADO') return -1;
                if (statusA === 'COMPLETADO' && statusB === 'PENDIENTE') return 1;
                return b.timestamp?.toDate() - a.timestamp?.toDate();
            });

            sorted.forEach(order => {
                const date = order.timestamp?.toDate().toLocaleString() || 'N/A';
                const isCompleted = order.status === 'COMPLETADO';
                const isTable = order.service === 'En Sitio';
                const btnText = isTable ? 'ENTREGAR EN MESA' : 'MARCAR COMO COMPLETADO';

                const card = document.createElement('div');
                card.className = `order-card ${isCompleted ? 'completed' : ''}`;
                card.innerHTML = `
                    <div class="order-header">
                        <div class="order-id">ORDEN #${order.ref || order.id.slice(-4).toUpperCase()}</div>
                        <div class="order-date">${date}</div>
                    </div>
                    <div class="client-info">
                        <p><strong>Cliente:</strong> ${order.name} | ${order.phone}</p>
                        <p><strong>Ubicación:</strong> ${order.neighbor || 'N/A'} - ${order.address || 'N/A'}</p>
                        ${order.table ? `<p><strong>Mesa:</strong> #${order.table}</p>` : ''}
                    </div>
                    <div class="order-details">
                        <div class="detail-item"><span>Servicio:</span> <span>${order.service}</span></div>
                        <div class="detail-item"><span>Pago:</span> <span>${order.payment}</span></div>
                        ${order.notes ? `<div class="detail-item"><span>Notas:</span> <span>${order.notes}</span></div>` : ''}
                    </div>
                    <div class="order-items">
                        <h4>Productos</h4>
                        ${order.items.map(i => `
                            <div class="product-line">
                                <span>${i.qty}x ${i.name}</span>
                                <span>${formatCOP(i.price)} c/u</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="order-totals">
                        <div class="total-row"><span>Subtotal:</span> <span>${formatCOP(order.subtotal || 0)}</span></div>
                        <div class="total-row"><span>Domicilio:</span> <span>${formatCOP(order.deliveryCost || 0)}</span></div>
                        <div class="total-final">TOTAL A COBRAR: ${formatCOP(order.total || 0)}</div>
                    </div>
                    ${!isCompleted ? `<button class="btn-complete" onclick="completeOrder('${order.id}')">${btnText}</button>` : ''}
                `;
                container.appendChild(card);
            });
        }

        async function completeOrder(id) {
            try {
                await db.collection("pedidos").doc(id).update({ status: 'COMPLETADO' });
            } catch (err) {
                alert("Error al completar el pedido.");
            }
        }

        function renderAnalysis() {
            renderMonthlyTable();
            renderProductTable();
            renderDailyTable();
        }

        function renderMonthlyTable() {
            const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const container = document.getElementById('table-monthly');
            container.innerHTML = '';

            const currentYear = new Date().getFullYear();
            
            months.forEach((month, index) => {
                const monthOrders = allOrders.filter(o => {
                    const d = o.timestamp?.toDate();
                    return d && d.getMonth() === index && d.getFullYear() === currentYear;
                });
                const total = monthOrders.reduce((sum, o) => sum + (o.total || 0), 0);
                
                container.innerHTML += `
                    <tr>
                        <td>${month}</td>
                        <td>${monthOrders.length}</td>
                        <td>${formatCOP(total)}</td>
                    </tr>
                `;
            });
        }

        function renderProductTable() {
            const productMap = {};
            allOrders.forEach(order => {
                order.items.forEach(item => {
                    if (!productMap[item.name]) {
                        productMap[item.name] = { qty: 0, total: 0 };
                    }
                    productMap[item.name].qty += item.qty;
                    productMap[item.name].total += (item.qty * item.price);
                });
            });

            const sortedProducts = Object.entries(productMap).sort((a, b) => b[1].qty - a[1].qty);
            const container = document.getElementById('table-products');
            container.innerHTML = sortedProducts.map(([name, data]) => `
                <tr>
                    <td>${name}</td>
                    <td>${data.qty}</td>
                    <td>${formatCOP(data.total)}</td>
                </tr>
            `).join('');
        }

        function renderDailyTable() {
            const dailyMap = {};
            allOrders.forEach(o => {
                const d = o.timestamp?.toDate();
                if (!d) return;
                const dateStr = d.toISOString().split('T')[0];
                if (!dailyMap[dateStr]) dailyMap[dateStr] = { count: 0, total: 0 };
                dailyMap[dateStr].count++;
                dailyMap[dateStr].total += (o.total || 0);
            });

            const sortedDays = Object.entries(dailyMap).sort((a, b) => b[0].localeCompare(a[0]));
            const container = document.getElementById('table-daily');
            container.innerHTML = sortedDays.map(([date, data]) => `
                <tr>
                    <td>${date}</td>
                    <td>${data.count}</td>
                    <td>${formatCOP(data.total)}</td>
                </tr>
            `).join('');
        }

        async function clearDatabase() {
            if (!confirm("¿ESTÁS SEGURO? Esta acción eliminará TODOS los pedidos de la base de datos de forma permanente.")) return;
            
            try {
                const snapshot = await db.collection("pedidos").get();
                const batch = db.batch();
                snapshot.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                alert("Base de datos limpiada con éxito.");
            } catch (err) {
                alert("Error al limpiar la base de datos.");
            }
        }

        function formatCOP(num) { return '$' + num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }

        // Initial Auth Check
        checkAuth();
    </script>
